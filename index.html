<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>졸업전시위원회 조직도</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #2563EB;
    --navy: #1a3a5c;
    --dark: #0f172a;
    --mid: #475569;
    --light: #94a3b8;
    --border: #e2e8f0;
    --conn: #cbd5e1;
    --bg: #ffffff;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    padding: 40px 16px 80px;
  }

  header { margin-bottom: 40px; text-align: center; }
  header h1 { font-size: clamp(18px,5vw,26px); font-weight:700; letter-spacing:-0.03em; margin-bottom:4px; }
  header p  { font-size:12px; color:var(--light); }

  /* ── NODE ── */
  .nd {
    border-radius: 7px;
    padding: 9px 18px;
    font-size: clamp(11px,2.5vw,13px);
    font-weight: 600;
    white-space: nowrap;
    cursor: default;
    user-select: none;
    transition: filter .2s, transform .15s;
    display: inline-block;
  }
  .nd:hover { filter: brightness(1.08); transform: translateY(-1px); }

  .nd-root {
    background: var(--dark); color: #fff;
    font-weight: 700; padding: 11px 24px; border-radius: 8px;
  }
  .nd-root .sub { display:block; font-size:10px; font-weight:400; opacity:.65; margin-top:3px; line-height:1.6; white-space:normal; }

  .nd-blue { background: var(--blue); color: #fff; border-radius: 7px; min-width: 120px; text-align: center; padding: 7px 14px; font-size: clamp(10px, 2.2vw, 12px); }
  .nd-blue .sub { display:block; font-size:10px; font-weight:400; opacity:.78; margin-top:2px; white-space:normal; }

  .nd-navy { background: var(--navy); color: #fff; border-radius: 7px; font-size:11px; padding: 7px 14px; text-align:center; }
  .nd-navy span { display:block; font-family:'DM Mono',monospace; font-weight:400; font-size:11px; margin-top:1px; }

  .nd-navy-outline {
    background: var(--white); color: var(--navy);
    border: 1.5px solid var(--navy); border-radius: 7px;
  }
  .nd-navy-outline .sub { display:block; font-size:10px; color:var(--mid); font-weight:400; margin-top:2px; }

  .nd-member {
    background: var(--white); color: var(--mid);
    border: 1.5px solid var(--border);
    padding: 7px 20px; border-radius: 7px;
    font-size: clamp(10px,2vw,12px);
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
    white-space: nowrap;
    min-width: 80px;
    text-align: center;
  }

  /* ── CONNECTORS ── */
  .vline { width:2px; background:var(--conn); margin:0 auto; flex-shrink:0; }
  .hline { height:2px; background:var(--conn); flex-shrink:0; }

  /* ── LAYOUT ── */
  .tree {
    display: flex; flex-direction: column; align-items: center;
    animation: fadeIn .5s ease both;
    position: relative; z-index:1;
  }

  .level {
    display: flex; flex-direction: row;
    justify-content: center; align-items: flex-start;
    gap: clamp(10px,3vw,40px);
    width: 100%;
  }

  .branch { display:flex; flex-direction:column; align-items:center; }

  .team-inner {
    display: flex; flex-direction: row;
    justify-content: center;
    gap: clamp(6px,2vw,20px);
  }
  .leader-branch { display:flex; flex-direction:column; align-items:center; }
  .members-col { display:flex; flex-direction:column; align-items:center; gap:4px; }

  /* chart wrapper for SVG */
  .chart-wrap { position:relative; width:100%; max-width:900px; margin:0 auto; }
  svg.conn { position:absolute; top:0; left:0; pointer-events:none; overflow:visible; z-index:0; }

  /* ── MOBILE: collapse to vertical scroll ── */
  @media (max-width: 600px) {
    .level { gap: 8px; }
    .team-inner { gap: 8px; }
    .nd { font-size: 11px; padding: 7px 12px; }
    .nd-root { padding: 10px 16px; }
    .nd-navy { font-size: 10px; padding: 6px 10px; }
    .nd-member { font-size: 10px; padding: 5px 8px; }
  }

  /* very small: stack teams vertically */
  @media (max-width: 420px) {
    .level#lv-teams {
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .level#lv-teams .branch { width: 100%; max-width: 320px; }
    .level#lv-teams .branch:not(:first-child)::before {
      content: '';
      width: 2px; height: 20px;
      background: var(--conn);
      display: block;
      margin: 0 auto;
    }
    .team-inner { gap: 12px; }
  }

  @keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<header>
  <h1>졸업전시위원회 조직도</h1>
  <p>2026 Graduation Exhibition Committee</p>
</header>

<div class="chart-wrap" id="cw">
  <svg class="conn" id="svg"></svg>

  <div class="tree" id="tree">

    <!-- 위원장 -->
    <div class="nd nd-root" id="chairman">
      위원장
      <span class="sub">대표 김나현 · 김민채 &nbsp;|&nbsp; 부대표 김채원</span>
    </div>
    <div class="vline" style="height:24px;"></div>

    <!-- 집행부 + 회계부 -->
    <div class="level" id="lv-top">
      <div class="branch">
        <div class="nd nd-blue" id="exec" style="padding:9px 18px; font-size:clamp(11px,2.5vw,13px);">
          집행부
          <span class="sub">각 부서 팀장으로 구성 · 내용 전달</span>
        </div>
      </div>
      <div class="branch">
        <div class="nd nd-navy-outline" id="account">
          회계부
          <span class="sub">이채빈 · 이현정</span>
        </div>
      </div>
    </div>
    <div class="vline" style="height:24px;"></div>

    <!-- 3 teams -->
    <div class="level" id="lv-teams">

      <!-- 디자인팀 -->
      <div class="branch" id="b-design">
        <div class="nd nd-blue" id="n-design">디자인팀</div>
        <div class="vline" style="height:16px;"></div>
        <div class="team-inner">
          <div class="leader-branch">
            <div class="nd nd-navy" id="l-ds">공간 팀장<span>박선민</span></div>
            <div class="vline" style="height:12px;"></div>
            <div class="members-col" id="mc-ds">
              <div class="nd nd-member">김준희</div>
              <div class="nd nd-member">이유경</div>
              <div class="nd nd-member">주예성</div>
              <div class="nd nd-member">정서희</div>
              <div class="nd nd-member">최다은</div>
              <div class="nd nd-member">박선민</div>
            </div>
          </div>
          <div class="leader-branch">
            <div class="nd nd-navy" id="l-da">건축 팀장<span>조화연</span></div>
            <div class="vline" style="height:12px;"></div>
            <div class="members-col" id="mc-da">
              <div class="nd nd-member">김예인</div>
              <div class="nd nd-member">조화연</div>
              <div class="nd nd-member">이다현</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 전시팀 -->
      <div class="branch" id="b-exh">
        <div class="nd nd-blue" id="n-exh">전시팀</div>
        <div class="vline" style="height:16px;"></div>
        <div class="team-inner">
          <div class="leader-branch">
            <div class="nd nd-navy" id="l-es">공간 팀장<span>박령빈</span></div>
            <div class="vline" style="height:12px;"></div>
            <div class="members-col" id="mc-es">
              <div class="nd nd-member">배민주</div>
              <div class="nd nd-member">강문주</div>
              <div class="nd nd-member">도지인</div>
              <div class="nd nd-member">박령빈</div>
              <div class="nd nd-member">김이진</div>
              <div class="nd nd-member">임민영</div>
              <div class="nd nd-member">장이윤</div>
            </div>
          </div>
          <div class="leader-branch">
            <div class="nd nd-navy" id="l-ea">건축 팀장<span>안혜원</span></div>
            <div class="vline" style="height:12px;"></div>
            <div class="members-col" id="mc-ea">
              <div class="nd nd-member">정의영</div>
              <div class="nd nd-member">안혜원</div>
              <div class="nd nd-member">김현지</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 온라인팀 -->
      <div class="branch" id="b-onl">
        <div class="nd nd-blue" id="n-onl">온라인팀</div>
        <div class="vline" style="height:16px;"></div>
        <div class="team-inner">
          <div class="leader-branch">
            <div class="nd nd-navy" id="l-os">공간 팀장<span>윤지현</span></div>
            <div class="vline" style="height:12px;"></div>
            <div class="members-col" id="mc-os">
              <div class="nd nd-member">조호진</div>
              <div class="nd nd-member">박서연</div>
              <div class="nd nd-member">김보임</div>
              <div class="nd nd-member">이의진</div>
              <div class="nd nd-member">윤지현</div>
              <div class="nd nd-member">임세연</div>
            </div>
          </div>
          <div class="leader-branch">
            <div class="nd nd-navy" id="l-oa">건축 팀장<span>이유안</span></div>
            <div class="vline" style="height:12px;"></div>
            <div class="members-col" id="mc-oa">
              <div class="nd nd-member">이정민</div>
              <div class="nd nd-member">이유안</div>
              <div class="nd nd-member">정예원</div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- lv-teams -->
  </div><!-- tree -->
</div><!-- chart-wrap -->

<script>
const STROKE = '#cbd5e1', SW = 2, R = 3.5;

function draw() {
  const cw  = document.getElementById('cw');
  const svg = document.getElementById('svg');
  svg.innerHTML = '';
  svg.setAttribute('width',  cw.scrollWidth);
  svg.setAttribute('height', cw.scrollHeight);
  const wr = cw.getBoundingClientRect();

  function rc(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    const b = el.getBoundingClientRect();
    return { t:b.top-wr.top, b:b.bottom-wr.top, l:b.left-wr.left, r:b.right-wr.left,
             midX:b.left-wr.left+b.width/2, midY:b.top-wr.top+b.height/2 };
  }
  function ln(x1,y1,x2,y2) {
    const e = document.createElementNS('http://www.w3.org/2000/svg','line');
    e.setAttribute('x1',x1);e.setAttribute('y1',y1);
    e.setAttribute('x2',x2);e.setAttribute('y2',y2);
    e.setAttribute('stroke',STROKE);e.setAttribute('stroke-width',SW);
    e.setAttribute('stroke-linecap','round');
    svg.appendChild(e);
  }
  function dt(cx,cy,filled=false) {
    const e = document.createElementNS('http://www.w3.org/2000/svg','circle');
    e.setAttribute('cx',cx);e.setAttribute('cy',cy);e.setAttribute('r',R);
    e.setAttribute('stroke',STROKE);e.setAttribute('stroke-width',1.5);
    e.setAttribute('fill',filled?STROKE:'white');
    svg.appendChild(e);
  }

  // chairman → exec + account
  const ch=rc('chairman'), ex=rc('exec'), ac=rc('account');
  if(ch&&ex&&ac){
    const jy=ch.b+(ex.t-ch.b)/2;
    ln(ch.midX,ch.b,ch.midX,jy); dt(ch.midX,ch.b,true);
    ln(ex.midX,jy,ac.midX,jy);
    ln(ex.midX,jy,ex.midX,ex.t); dt(ex.midX,ex.t,false);
    ln(ac.midX,jy,ac.midX,ac.t); dt(ac.midX,ac.t,false);
  }

  // exec → 3 teams
  const nd=rc('n-design'),ne=rc('n-exh'),no=rc('n-onl');
  if(ex&&nd&&ne&&no){
    const jy=ex.b+(nd.t-ex.b)/2;
    ln(ex.midX,ex.b,ex.midX,jy); dt(ex.midX,ex.b,true);
    ln(nd.midX,jy,no.midX,jy);
    [nd,ne,no].forEach(n=>{ln(n.midX,jy,n.midX,n.t);dt(n.midX,n.t,false);});
  }

  // team → leaders
  function t2l(tid,lids){
    const tn=rc(tid), ls=lids.map(rc).filter(Boolean);
    if(!tn||!ls.length) return;
    const jy=tn.b+(ls[0].t-tn.b)/2;
    ln(tn.midX,tn.b,tn.midX,jy); dt(tn.midX,tn.b,true);
    if(ls.length>1) ln(ls[0].midX,jy,ls[ls.length-1].midX,jy);
    ls.forEach(l=>{ln(l.midX,jy,l.midX,l.t);dt(l.midX,l.t,false);});
  }
  t2l('n-design',['l-ds','l-da']);
  t2l('n-exh',   ['l-es','l-ea']);
  t2l('n-onl',   ['l-os','l-oa']);

  // leader → members
  function l2m(lid,mcid){
    const ld=rc(lid), mc=document.getElementById(mcid);
    if(!ld||!mc) return;
    const kids=Array.from(mc.children);
    if(!kids.length) return;
    const mrs=kids.map(k=>{const b=k.getBoundingClientRect();
      return{midX:b.left-wr.left+b.width/2,t:b.top-wr.top};});
    const jy=ld.b+(mrs[0].t-ld.b)/2;
    ln(ld.midX,ld.b,ld.midX,jy); dt(ld.midX,ld.b,true);
    if(mrs.length>1) ln(mrs[0].midX,jy,mrs[mrs.length-1].midX,jy);
    mrs.forEach(m=>{ln(m.midX,jy,m.midX,m.t);dt(m.midX,m.t,false);});
  }
  l2m('l-ds','mc-ds'); l2m('l-da','mc-da');
  l2m('l-es','mc-es'); l2m('l-ea','mc-ea');
  l2m('l-os','mc-os'); l2m('l-oa','mc-oa');
}

window.addEventListener('load',   ()=>setTimeout(draw,150));
window.addEventListener('resize', ()=>setTimeout(draw,50));
</script>
</body>
</html>
